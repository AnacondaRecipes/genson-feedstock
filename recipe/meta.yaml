{% set version = "1.3.0" %}

package:
  name: genson
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/g/genson/genson-{{ version }}.tar.gz
  sha256: e02db9ac2e3fd29e65b5286f7135762e2cd8a986537c075b06fc5f1517308e37
  patches:
    - 75.patch

build:
  number: 0
  noarch: python
  script: "{{ PYTHON }} -m pip install --no-deps --no-build-isolation -vv ."
  entry_points:
    - genson = genson.__main__:main

requirements:
  build:
    - patch # [unix]
    - msys2-patch # [win]
  host:
    - python 3.9
    - wheel
    - pip
    - setuptools

  run:
    - python >=3.9

test:
  imports:
    - genson
  source_files:
    - test
  requires:
    - pip
    - jsonschema >=4.0.0
    - pytest
  commands:
    - pip check
    - pytest test -v -k "not test_no_input"
    - genson --help

about:
  home: https://github.com/wolverdude/genson/
  license: MIT
  license_file: LICENSE
  license_family: MIT
  summary: 'GenSON is a powerful, user-friendly JSON Schema generator.'
  dev_url: https://github.com/wolverdude/genson/
  doc_url: https://github.com/wolverdude/GenSON/blob/master/README.rst
  description: GenSON is a powerful, user-friendly JSON Schema generator built in Python.

extra:
  recipe-maintainers:
    - pmlandwehr
