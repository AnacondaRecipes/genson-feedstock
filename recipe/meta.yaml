{% set name = "genson" %}
{% set version = "1.4.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: bc7f1c1bae87a21ca44d81149aec95a3f4468d676de9b8b08caa064f3c50b3da

build:
  number: 0
  skip: true  # [py<310]
  script: "{{ PYTHON }} -m pip install --no-deps --no-build-isolation -vv ."
  entry_points:
    - genson = genson.__main__:main

requirements:
  host:
    - python
    - wheel
    - pip
    - setuptools >=44

  run:
    - python

test:
  imports:
    - genson
  source_files:
    - test
  requires:
    - pip
    - jsonschema >=4.0.0
    - pytest
  commands:
    - pip check
    - pytest test -vv
    - genson --help

about:
  home: https://github.com/wolverdude/genson/
  license: MIT
  license_file: LICENSE
  license_family: MIT
  summary: 'GenSON is a powerful, user-friendly JSON Schema generator.'
  dev_url: https://github.com/wolverdude/genson/
  doc_url: https://github.com/wolverdude/GenSON/blob/master/README.rst
  description: GenSON is a powerful, user-friendly JSON Schema generator built in Python.

extra:
  recipe-maintainers:
    - pmlandwehr
